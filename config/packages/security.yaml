# config/packages/security.yaml
security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: auto
            cost: 12
        App\Entity\Society:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        society_provider:
            entity:
                class: App\Entity\Society
                property: email
        all_users_provider:
            chain:
                providers: [app_user_provider, society_provider]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        society:
            pattern: ^/society
            lazy: true
            context: shared_context # IMPORTANT : même nom que dans main
            provider: society_provider
            user_checker: App\Security\UserChecker
            form_login:
                login_path: society_login
                check_path: society_login
                enable_csrf: true
                csrf_token_id: authenticate
                success_handler: App\Security\SocietyLoginSuccessHandler
            logout:
                path: society_logout
                target: /
                invalidate_session: true

        main:
            lazy: true
            context: shared_context # IMPORTANT : même nom que dans society
            provider: all_users_provider 
            user_checker: App\Security\UserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                csrf_token_id: authenticate
                success_handler: App\Security\LoginSuccessHandler
            logout:
                path: app_logout
                target: /
                invalidate_session: true

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/society/login, roles: PUBLIC_ACCESS }
        - { path: ^/society/register, roles: PUBLIC_ACCESS }
        
        # Autoriser explicitement l'accès aux réclamations
        - { path: ^/reclamations/support, roles: [ROLE_USER, ROLE_SOCIETY] }
        
        - { path: ^/society, roles: ROLE_SOCIETY }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/user, roles: ROLE_USER }